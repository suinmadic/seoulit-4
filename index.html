<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>간이 MBTI 성향 검사</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 시작 화면 -->
        <div id="start-screen" class="screen">
            <h1>🧩 MBTI 성향 검사</h1>
            <p>나의 성향을 알아보는 간단한 테스트입니다.</p>
            <button id="start-btn" class="btn">테스트 시작하기</button>
        </div>

        <!-- 질문 화면 -->
        <div id="question-screen" class="screen hide">
            <div class="progress-bar-container">
                <div id="progress-bar"></div>
            </div>
            <div id="question-number">Q1 / 12</div>
            <h2 id="question-text">질문 내용이 여기에 들어갑니다.</h2>
            <div class="answer-buttons">
                <button id="answer-a" class="btn answer-btn">선택지 A</button>
                <button id="answer-b" class="btn answer-btn">선택지 B</button>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="screen hide">
            <h1>당신의 MBTI 결과는?</h1>
            <div id="mbti-result">ESTJ</div>
            <p id="result-desc">결과에 대한 상세 설명이 여기에 나옵니다.</p>
            <button id="restart-btn" class="btn">다시 테스트하기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
